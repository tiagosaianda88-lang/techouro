name: AI News Aggregator

on:
  push:
    branches:
      - main
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install feedparser google-genai beautifulsoup4 pypdf

    - name: Run News Pipeline Safety Tests
      env:
        PYTHONPATH: scripts
      run: python -m unittest scripts/test_update_news.py -v

    - name: Run AI News and Country Scripts
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python scripts/update_news.py
        python scripts/update_countries.py

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action AI"
        git add noticias.html paises.html index.html
        # Only commit if there are changes
        git diff --quiet && git diff --staged --quiet || (git commit -m "Automated AI News and Country Updates" && git push)
